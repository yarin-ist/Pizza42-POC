<!-- Full-screen backdrop -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  style="background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);"
  (click)="dismiss()">

  <!-- Modal card — stop click propagation so clicking inside doesn't dismiss -->
  <div
    class="glass max-w-sm w-full p-8 text-center"
    (click)="$event.stopPropagation()">

    <!-- Icon -->
    <div class="text-6xl mb-4">📧</div>

    <!-- Title -->
    <h2 class="text-2xl font-bold text-white mb-3">
      Verify Your Email
    </h2>

    <!-- Body -->
    <p class="text-slate-300 mb-2 leading-relaxed">
      We sent a verification link to
    </p>
    @if (email) {
      <p class="text-indigo-300 font-semibold mb-4 break-all">{{ email }}</p>
    }
    <p class="text-slate-400 text-sm mb-8 leading-relaxed">
      Please check your inbox and click the link to verify your email
      before placing an order. You can continue browsing in the meantime.
    </p>

    <!-- Dismiss — no "I've already verified" button.
         The user dismisses, verifies their email, then clicks Order Now again.
         The silent token refresh on the next attempt will detect verification. -->
    <button
      (click)="dismiss()"
      class="btn-identity w-full">
      Got it
    </button>

  </div>
</div>
